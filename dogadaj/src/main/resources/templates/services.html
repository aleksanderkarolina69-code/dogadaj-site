<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.w3.org/1999/xhtml">
<head th:replace="~{fragments/template :: head}"></head>

<body class="d-flex flex-column min-vh-100">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container" th:replace="~{fragments/template :: navbar}">
    </div>
</nav>

<!-- ✅ KLUCZOWE: flex-grow-1 -->
<main class="flex-grow-1">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center">
                        <h4 class="section-title mb-0">Twoje listy usług</h4>
                        <a th:href="@{/services/create}" class="btn btn-dog">
                            <i class="fas fa-plus"></i> Dodaj nową
                        </a>
                    </div>
                    <div class="card-body">
                        <div th:if="${#lists.isEmpty(lists)}">
                            <p class="text-muted">Nie masz jeszcze żadnych list usług.</p>
                        </div>
                        <div th:if="${!#lists.isEmpty(lists)}">
                            <ul class="list-group">
                                <li th:each="list : ${lists}" class="list-group-item d-flex justify-content-between align-items-center">
                                    <div>
                                        <strong th:text="${list.title}">Tytuł listy</strong>
                                        <br/>
                                        <small class="text-muted" th:text="${list.price} + ' zł | ' + ${list.time} + ' min'">Szczegóły</small>
                                    </div>
                                    <div class="d-flex gap-2">
                                        <a th:href="@{/services/view/{id}(id=${list.id})}" class="btn btn-outline-primary btn-sm">
                                            <i class="fas fa-eye"></i> Zobacz
                                        </a>
                                        <a th:href="@{/services/edit/{id}(id=${list.id})}" class="btn btn-outline-secondary btn-sm">
                                            <i class="fas fa-edit"></i> Edytuj
                                        </a>
                                        <a th:href="@{/services/delete/{id}(id=${list.id})}" class="btn btn-outline-danger btn-sm"
                                           onclick="return confirm('Na pewno chcesz usunąć tę listę?');">
                                            <i class="fas fa-trash"></i> Usuń
                                        </a>
                                    </div>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<br>
<br>
<!-- Footer -->
<footer th:replace="~{fragments/template :: footer}"></footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
