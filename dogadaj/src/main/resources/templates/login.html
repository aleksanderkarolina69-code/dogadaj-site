<!DOCTYPE html>
<html lang="pl" xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{fragments/template :: head}"></head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container" th:replace="~{fragments/template :: navbar}">
    </div>
</nav>

<!-- Główna sekcja logowania -->
<section class="py-5" style="background-color: #f5e6d3; min-height: 80vh; display: flex; align-items: center;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-7">

                <div class="card border-0 shadow" style="border-radius: 20px; overflow: hidden;">

                    <!-- Nagłówek karty -->
                    <div class="text-center pt-5 pb-4" style="background: linear-gradient(135deg, #f4c2c2, #f8a8a8);">
                        <img src="images/logo_cirlce.png" alt="DOGadaj" class="logo-circle mx-auto mb-3"
                             style="width: 110px; height: 110px; border: 6px solid white; border-radius: 50%;">
                        <h2 class="fw-bold text-white mb-1">Witaj ponownie!</h2>
                        <p class="text-white-50 mb-0">Zaloguj się do swojego konta</p>
                    </div>

                    <!-- Formularz logowania -->
                    <div class="card-body p-5">
                        <form th:action="@{/login}" method="post">

                            <!-- Komunikaty -->
                            <div th:if="${param.error}" class="alert alert-danger text-center py-3">
                                <i class="fas fa-exclamation-circle me-2"></i>
                                Nieprawidłowa nazwa użytkownika lub hasło
                            </div>
                            <div th:if="${param.logout}" class="alert alert-success text-center py-3">
                                <i class="fas fa-check-circle me-2"></i>
                                Zostałeś pomyślnie wylogowany
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-semibold">Nazwa użytkownika lub email</label>
                                <input type="text"
                                       name="username"
                                       class="form-control form-control-lg"
                                       placeholder="Twój email"
                                       required>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-semibold">Hasło</label>
                                <input type="password"
                                       name="password"
                                       class="form-control form-control-lg"
                                       placeholder="••••••••"
                                       required>
                            </div>

                            <div class="d-grid mb-4">
                                <button type="submit" class="btn btn-dog btn-lg">
                                    <i class="fas fa-paw me-2"></i> Zaloguj się
                                </button>
                            </div>

                        </form>

                        <div class="text-center">
                            <p class="mb-2">Nie masz jeszcze konta?</p>
                            <a th:href="@{/register}" class="fw-semibold"
                               style="color: #8c5a2b; text-decoration: none;">
                                Zarejestruj się tutaj →
                            </a>
                        </div>
                    </div>
                </div>

                <!-- Link powrotny -->
                <div class="text-center mt-4">
                    <a th:href="@{/}" class="text-muted text-decoration-none">
                        ← Powrót do strony głównej
                    </a>
                </div>

            </div>
        </div>
    </div>
</section>

<!-- Footer -->
<footer th:replace="~{fragments/template :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
