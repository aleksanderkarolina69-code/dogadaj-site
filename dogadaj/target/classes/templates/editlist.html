<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.w3.org/1999/xhtml">

<head th:replace="~{fragments/template :: head}"></head>

<body class="d-flex flex-column min-vh-100">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container" th:replace="~{fragments/template :: navbar}"></div>
</nav>
<main class="flex-grow-1">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card shadow-sm border-0">

                <div class="card-header bg-white py-3">
                    <h3 class="section-title mb-0">Edytuj Usługę</h3>
                </div>

                <div class="card-body">
                    <form th:action="@{/services/edit/{id}(id=${list.id})}"
                          th:object="${list}"
                          method="post">

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Nazwa listy / usługi</label>
                            <input type="text"
                                   th:field="*{title}"
                                   class="form-control form-control-lg"
                                   placeholder="Np. Szkolenie z luźnej smyczy">
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Czas (w godz.)</label>
                                <input type="number"
                                       step="0.5"
                                       th:field="*{time}"
                                       class="form-control">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Cena (zł)</label>
                                <input type="number"
                                       step="1"
                                       th:field="*{price}"
                                       class="form-control">
                            </div>
                        </div>

                        <div class="d-flex gap-3 mt-4">
                            <button type="submit" class="btn btn-dog flex-grow-1 py-3">
                                <i class="fas fa-save"></i> Zapisz zmiany
                            </button>

                            <a th:href="@{/services}" class="btn btn-outline-secondary flex-grow-1 py-3">
                                Anuluj
                            </a>
                        </div>

                    </form>
                </div>

            </div>
        </div>
    </div>
</div>
</main>
<footer th:replace="~{fragments/template :: footer}"></footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>


</html>
