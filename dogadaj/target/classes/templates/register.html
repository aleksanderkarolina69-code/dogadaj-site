<!DOCTYPE html>
<html lang="pl" xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{fragments/template :: head}"></head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container" th:replace="~{fragments/template :: navbar}"></div>
</nav>

<!-- Główna sekcja rejestracji -->
<section class="py-5" style="background-color: #f5e6d3; min-height: 80vh; display: flex; align-items: center;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">

                <div class="card border-0 shadow" style="border-radius: 20px; overflow: hidden;">

                    <!-- Nagłówek karty -->
                    <div class="text-center pt-5 pb-4" style="background: linear-gradient(135deg, #f4c2c2, #f8a8a8);">
                        <img src="/images/logo_cirlce.png"
                             alt="DOGadaj"
                             class="logo-circle mx-auto mb-3"
                             style="width: 110px; height: 110px; border: 6px solid white; border-radius: 50%;">
                        <h2 class="fw-bold text-white mb-1">Dołącz do DOGadaj</h2>
                        <p class="text-white-50 mb-0">Utwórz konto i zacznij lepiej rozumieć swojego psa</p>
                    </div>

                    <!-- Formularz rejestracji -->
                    <div class="card-body p-5">
                        <form th:action="@{/register}" method="post" th:object="${user}">

                            <!-- Komunikaty -->
                            <div th:if="${success}" class="alert alert-success text-center py-3">
                                <i class="fas fa-check-circle me-2"></i>
                                Konto zostało pomyślnie utworzone!
                            </div>

                            <div th:if="${#fields.hasErrors('*')}" class="alert alert-danger text-center py-3">
                                <i class="fas fa-exclamation-circle me-2"></i>
                                Sprawdź wprowadzone dane
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-4">
                                    <label class="form-label fw-semibold">Imię</label>
                                    <input type="text"
                                           th:field="*{name}"
                                           class="form-control form-control-lg"
                                           placeholder="Twoje imię"
                                           required>
                                    <div th:if="${#fields.hasErrors('name')}" class="text-danger small mt-1">
                                        <span th:errors="*{name}"></span>
                                    </div>
                                </div>
                                <div class="col-md-6 mb-4">
                                    <label class="form-label fw-semibold">Nazwisko</label>
                                    <input type="text"
                                           th:field="*{surname}"
                                           class="form-control form-control-lg"
                                           placeholder="Twoje nazwisko"
                                           required>
                                    <div th:if="${#fields.hasErrors('surname')}" class="text-danger small mt-1">
                                        <span th:errors="*{surname}"></span>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-semibold">Email</label>
                                <input type="email"
                                       th:field="*{email}"
                                       class="form-control form-control-lg"
                                       placeholder="twoj@email.pl"
                                       required>
                                <div th:if="${#fields.hasErrors('email')}" class="text-danger small mt-1">
                                    <span th:errors="*{email}"></span>
                                </div>
                            </div>

                            <!-- Pole Kraj jako lista rozwijana -->
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Kraj</label>
                                <select th:field="*{country}"
                                        class="form-control form-control-lg"
                                        required>
                                    <option value="">Wybierz kraj...</option>
                                    <option value="Polska">Polska</option>
                                    <option value="Niemcy">Niemcy</option>
                                    <option value="Czechy">Czechy</option>
                                    <option value="Słowacja">Słowacja</option>
                                    <option value="Ukraina">Ukraina</option>
                                    <option value="Białoruś">Białoruś</option>
                                    <option value="Litwa">Litwa</option>
                                    <option value="Łotwa">Łotwa</option>
                                    <option value="Rosja">Rosja</option>
                                    <option value="Francja">Francja</option>
                                    <option value="Hiszpania">Hiszpania</option>
                                    <option value="Włochy">Włochy</option>
                                    <option value="Wielka Brytania">Wielka Brytania</option>
                                    <option value="Stany Zjednoczone">Stany Zjednoczone</option>
                                    <option value="Inny">Inny</option>
                                </select>
                                <div th:if="${#fields.hasErrors('country')}" class="text-danger small mt-1">
                                    <span th:errors="*{country}"></span>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-semibold">Data urodzenia</label>
                                <input type="date"
                                       th:field="*{yearofbirth}"
                                       class="form-control form-control-lg"
                                       required>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-semibold">Hasło</label>
                                <input type="password"
                                       th:field="*{password}"
                                       class="form-control form-control-lg"
                                       placeholder="Minimum 8 znaków"
                                       required>
                            </div>

                            <div class="d-grid mb-4">
                                <button type="submit" class="btn btn-dog btn-lg">
                                    <i class="fas fa-paw me-2"></i> Utwórz konto
                                </button>
                            </div>
                        </form>

                        <div class="text-center">
                            <p class="mb-2">Masz już konto?</p>
                            <a th:href="@{/login}" class="fw-semibold"
                               style="color: #8c5a2b; text-decoration: none;">
                                Zaloguj się tutaj →
                            </a>
                        </div>
                    </div>
                </div>

                <!-- Link powrotny -->
                <div class="text-center mt-4">
                    <a th:href="@{/}" class="text-muted text-decoration-none">
                        ← Powrót do strony głównej
                    </a>
                </div>

            </div>
        </div>
    </div>
</section>

<!-- Footer -->
<footer th:replace="~{fragments/template :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
